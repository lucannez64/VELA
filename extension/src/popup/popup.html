<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary:           #73db9a;
      --primary-dim:       #1c8f56;
      --primary-on:        #00391d;
      --surface:           #121416;
      --surface-low:       #1a1c1e;
      --surface-container: #1e2022;
      --surface-high:      #282a2c;
      --surface-highest:   #333537;
      --on-surface:        #e2e2e5;
      --on-surface-var:    #c4c7c7;
      --outline:           #8e9192;
      --outline-var:       #444748;
      --error:             #ffb4ab;
      --font-head:         'Space Grotesk', sans-serif;
      --font-body:         'Manrope', sans-serif;
      --font-mono:         'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      width: 360px;
      min-height: 420px;
      background: var(--surface);
      color: var(--on-surface);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--outline-var);
    }

    .header-logo {
      color: var(--primary);
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .header-brand {
      flex: 1;
    }

    .header-title {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      color: var(--on-surface);
      letter-spacing: 0.08em;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--on-surface-var);
      font-weight: 400;
      margin-top: 1px;
      letter-spacing: 0.04em;
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: var(--surface-low);
      border-bottom: 1px solid var(--outline-var);
      font-size: 12px;
      color: var(--on-surface-var);
    }

    .status-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-indicator.connected {
      background: var(--primary);
      box-shadow: 0 0 6px rgba(115, 219, 154, 0.5);
    }

    .status-indicator.disconnected {
      background: var(--error);
    }

    /* ── Main Content ── */
    .main-content {
      flex: 1;
      padding: 14px 16px;
      overflow-y: auto;
    }

    .main-content::-webkit-scrollbar {
      width: 4px;
    }

    .main-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: var(--outline-var);
      border-radius: 4px;
    }

    /* ── Loading ── */
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--outline-var);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Section Title ── */
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--on-surface-var);
      margin-bottom: 10px;
      padding: 0 2px;
    }

    /* ── Login List ── */
    .login-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .login-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--surface-container);
      border: 1px solid var(--outline-var);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .login-item:hover {
      background: var(--surface-high);
      border-color: var(--primary);
    }

    .login-item:active {
      background: var(--surface-highest);
    }

    .login-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dim) 100%);
      color: var(--primary-on);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .login-info {
      flex: 1;
      min-width: 0;
    }

    .login-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .login-url {
      font-size: 12px;
      color: var(--on-surface-var);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .login-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--on-surface-var);
      transition: background 0.12s, color 0.12s;
    }

    .icon-btn:hover {
      background: var(--surface-highest);
      color: var(--primary);
    }

    .icon-btn:active {
      background: var(--outline-var);
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 36px 16px;
    }

    .empty-state-icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 14px;
      color: var(--outline);
    }

    .empty-state-title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 600;
      color: var(--on-surface);
      margin-bottom: 6px;
    }

    .empty-state-text {
      font-size: 13px;
      color: var(--on-surface-var);
      line-height: 1.5;
    }

    /* ── Footer ── */
    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--outline-var);
      display: flex;
      justify-content: space-between;
      background: var(--surface-low);
    }

    .footer-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      color: var(--on-surface-var);
      border-radius: 8px;
      transition: background 0.12s, color 0.12s;
    }

    .footer-btn:hover {
      background: var(--surface-high);
      color: var(--primary);
    }

    .footer-btn:active {
      background: var(--surface-highest);
    }

    .footer-btn svg {
      flex-shrink: 0;
    }

    /* ── Notification toast ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(4px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z" fill="currentColor"/>
      </svg>
    </div>
    <div class="header-brand">
      <div class="header-title">VELA</div>
      <div class="header-subtitle">Password Manager</div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-indicator disconnected" id="statusIndicator"></div>
    <span id="statusText">Checking connection…</span>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="footer-btn" id="openVaultBtn">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
      </svg>
      Open Vault
    </button>
    <button class="footer-btn" id="settingsBtn">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
      </svg>
      Settings
    </button>
  </div>

  <script src="../shared/browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
