name: verify-server

# Build-only check for the server Docker image: no registry push, no Coolify
# deploy trigger. Mirrors build-server.yml's build step but stops before
# publishing, so — unlike build-server.yml — this is safe to run on pull
# requests and arbitrary branches, including PRs whose base isn't `main`
# (build-server.yml only fires on push:main, so it never runs as a PR check).

on:
  pull_request:
    paths:
      - "serverVELA/**"
      - "libVELA/vela-crypto/**"
      - "libVELA/vela-core/**"
      - "libVELA/vela-wasm-bridge/**"
      - "webVELA/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/verify-server.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: vela-server:verify
          cache-from: type=gha
          cache-to: type=gha,mode=max
