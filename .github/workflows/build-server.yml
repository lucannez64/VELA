name: build-server

# Build the VELA server image on GitHub's runners (the home server is too small
# to compile Rust) and publish it to GHCR. Coolify then just pulls and runs it.

on:
  push:
    branches: [main]
    paths:
      - "serverVELA/**"
      - "libVELA/vela-crypto/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build-server.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vela-server

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # CI runners have plenty of RAM, so restore fat LTO for a faster binary.
          build-args: |
            CARGO_PROFILE_RELEASE_LTO=true
            CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: auto-redeploy in Coolify after a new image is pushed.
      # Set repo secret COOLIFY_DEPLOY_HOOK (the app's Coolify deploy webhook URL,
      # e.g. https://<coolify>/api/v1/deploy?uuid=<uuid>) and, if required,
      # COOLIFY_API_TOKEN. Without the secret this step is skipped.
      - name: Trigger Coolify deploy
        env:
          HOOK: ${{ secrets.COOLIFY_DEPLOY_HOOK }}
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        if: ${{ env.HOOK != '' }}
        run: |
          if [ -n "$TOKEN" ]; then
            curl -fsSL -X GET -H "Authorization: Bearer $TOKEN" "$HOOK"
          else
            curl -fsSL -X GET "$HOOK"
          fi
