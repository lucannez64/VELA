name: build-server

# Build the VELA server image on GitHub's runners (the home server is too small
# to compile Rust) and publish it to GHCR. Coolify then just pulls and runs it.

on:
  push:
    branches: [main]
    paths:
      - "serverVELA/**"
      - "libVELA/vela-crypto/**"
      - "libVELA/vela-core/**"
      - "libVELA/vela-wasm-bridge/**"
      - "webVELA/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build-server.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vela-server

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # CI runners have plenty of RAM, so restore fat LTO for a faster binary.
          build-args: |
            CARGO_PROFILE_RELEASE_LTO=true
            CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: auto-redeploy in Coolify after a new image is pushed.
      # Set repo secret COOLIFY_DEPLOY_HOOK (the app's Coolify deploy webhook URL,
      # e.g. https://<coolify>/api/v1/deploy?uuid=<uuid>) and, if required,
      # COOLIFY_API_TOKEN. Without the secret this step is skipped.
      # The image is already on GHCR at this point, so a deploy-hook hiccup must
      # not fail the build. Capture the HTTP status + body for diagnosis and
      # surface a non-2xx response as a warning instead of erroring out.
      # COOLIFY_DEPLOY_SECRET (optional): a shared secret sent as the
      # X-Deploy-Secret header. Pair it with a Cloudflare WAF custom rule that
      # skips Bot Fight Mode for /api/v1/deploy when this header matches, so the
      # GitHub runner (a datacenter IP) isn't challenged.
      - name: Trigger Coolify deploy
        env:
          HOOK: ${{ secrets.COOLIFY_DEPLOY_HOOK }}
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOY_SECRET: ${{ secrets.COOLIFY_DEPLOY_SECRET }}
        if: ${{ env.HOOK != '' }}
        run: |
          if [ -n "$TOKEN" ]; then
            CODE=$(curl -sS -o /tmp/coolify.out -w '%{http_code}' -X GET \
              -H "Authorization: Bearer $TOKEN" \
              -H "X-Deploy-Secret: $DEPLOY_SECRET" \
              "$HOOK")
          else
            CODE=$(curl -sS -o /tmp/coolify.out -w '%{http_code}' -X GET \
              -H "X-Deploy-Secret: $DEPLOY_SECRET" \
              "$HOOK")
          fi
          echo "Coolify responded HTTP $CODE"
          echo "--- response body ---"
          cat /tmp/coolify.out 2>/dev/null || true
          echo
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::warning::Coolify deploy hook returned HTTP $CODE. Image was published to GHCR; auto-deploy was not triggered. Check the COOLIFY_API_TOKEN / COOLIFY_DEPLOY_HOOK secrets."
          fi
