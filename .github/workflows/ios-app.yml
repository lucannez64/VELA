name: ios-app

# Phase 1: build the SwiftUI iOS app (linking VelaCore.xcframework) and verify it
# in the iOS Simulator on a macOS runner — launch it and capture a screenshot.
# The Xcode project is generated from project.yml via XcodeGen (no committed .xcodeproj).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "iosVELA/**"
      - "libVELA/vela-apple-bridge/**"
      - "libVELA/vela-core/**"
      - "libVELA/vela-crypto/**"
      - ".github/workflows/ios-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "iosVELA/**"
      - "libVELA/vela-apple-bridge/**"
      - "libVELA/vela-core/**"
      - "libVELA/vela-crypto/**"
      - ".github/workflows/ios-app.yml"

concurrency:
  group: ios-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-screenshot:
    # macos-15 defaults to Xcode 16, which can read XcodeGen's project format
    # (objectVersion 77). macos-14's default Xcode 15.4 cannot.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: libVELA/vela-apple-bridge

      - name: Build VelaCore.xcframework
        run: bash libVELA/vela-apple-bridge/build-xcframework.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: iosVELA
        run: xcodegen generate

      - name: Boot simulator, build + run unit tests
        working-directory: iosVELA
        run: |
          set -x
          xcodebuild -version
          UDID=$(xcrun simctl list devices available | grep -m1 'iPhone' | grep -oiE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          test -n "$UDID"
          echo "UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcodebuild test \
            -project VELA.xcodeproj -scheme VELA \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$UDID" \
            -derivedDataPath build \
            -only-testing:VELATests \
            CODE_SIGNING_ALLOWED=NO

      - name: Launch (seeded) and screenshot
        working-directory: iosVELA
        run: |
          set -x
          APP=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name 'VELA.app' | head -1)
          test -n "$APP"
          xcrun simctl install "$UDID" "$APP"
          # VELA_DEMO seeds a sample vault so the screenshot shows the populated list.
          SIMCTL_CHILD_VELA_DEMO=1 xcrun simctl launch "$UDID" com.vela.vault
          sleep 8
          xcrun simctl io "$UDID" screenshot ios-app.png
          xcrun simctl terminate "$UDID" com.vela.vault || true
          echo "screenshot captured"

      - name: Record UI walkthrough video
        working-directory: iosVELA
        run: |
          set -x
          # Record the simulator screen while the XCUITest drives every feature.
          xcrun simctl io "$UDID" recordVideo --codec h264 --force walkthrough.mp4 &
          REC_PID=$!
          sleep 2
          set +e
          xcodebuild test \
            -project VELA.xcodeproj -scheme VELA \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$UDID" \
            -derivedDataPath build \
            -only-testing:VELAUITests \
            CODE_SIGNING_ALLOWED=NO
          TEST_RC=$?
          set -e
          # Stop recording (SIGINT lets simctl finalize the mp4) and let it flush.
          kill -INT "$REC_PID" 2>/dev/null || true
          wait "$REC_PID" 2>/dev/null || true
          ls -la walkthrough.mp4 || true
          exit $TEST_RC

      - name: Upload app + screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vela-ios-app
          path: |
            iosVELA/build/Build/Products/Debug-iphonesimulator/VELA.app
            iosVELA/ios-app.png
            iosVELA/walkthrough.mp4
          if-no-files-found: warn
