name: release-android

# Build the Android app (Compose UI + Rust JNI bridge for all four ABIs) and
# publish a GitHub release carrying the APK. Version is derived from the commit:
# versionCode = commit count (monotonic integer), versionName = 0.1.<count>.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "androidVELA/**"
      - "libVELA/vela-android-bridge/**"
      - "libVELA/vela-crypto/**"
      - ".github/workflows/release-android.yml"

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NDK_VERSION: "26.3.11579264"

jobs:
  build:
    runs-on: ubuntu-latest
    # Mapped here (job-level env can read secrets) so a step `if` can detect
    # whether release signing is configured.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history for `git rev-list --count`

      - name: Derive version from commit
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          VERSION="0.1.$COUNT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=android-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: libVELA/vela-android-bridge

      # When the keystore secret is present, decode it and point Gradle at it so
      # the APK is signed with the stable release key. Without the secret this
      # step is skipped and Gradle falls back to the debug key.
      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/vela-release.jks"
          echo "VELA_KEYSTORE_FILE=$RUNNER_TEMP/vela-release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: androidVELA
        env:
          VELA_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          VELA_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          VELA_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease \
            -PvelaVersionCode=${{ steps.version.outputs.count }} \
            -PvelaVersionName=${{ steps.version.outputs.version }} \
            --no-daemon --stacktrace

      - name: Stage APK
        run: |
          SRC=androidVELA/app/build/outputs/apk/release/app-release.apk
          test -f "$SRC" || { echo "APK not found at $SRC"; find androidVELA/app/build/outputs -name '*.apk'; exit 1; }
          cp "$SRC" "VELA-android-v${{ steps.version.outputs.version }}.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "VELA Android v${{ steps.version.outputs.version }}"
          body: |
            Automated Android build.

            - Commit: ${{ github.sha }} (`${{ steps.version.outputs.sha }}`)
            - versionCode: ${{ steps.version.outputs.count }}
            - ABIs: arm64-v8a, armeabi-v7a, x86, x86_64
            - Signing: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && 'stable release key' || 'debug key (sideload / testing build)' }}
          files: VELA-android-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
