name: VELA
options:
  bundleIdPrefix: com.vela
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  VELA:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: VELA
        NSFaceIDUsageDescription: VELA uses Face ID to unlock your vault.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: Generated/VELA.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vela.vault
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.vela.vault.shared
        # iCloud Key-Value Storage for recovery Share 1 backup (SPEC.md §4.3,
        # see Shared/CloudRecoveryBackup.swift) — the blob is a few dozen
        # bytes, well under the 1 MB / 1024-key KVS limit, so no CloudKit
        # container is needed.
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vela.vault
        TARGETED_DEVICE_FAMILY: "1"
        # The Rust core may reference Security (RNG); link it defensively.
        OTHER_LDFLAGS: -framework Security
    dependencies:
      # Static-library XCFramework produced by libVELA/vela-apple-bridge — link, don't embed.
      - framework: ../libVELA/vela-apple-bridge/VelaCore.xcframework
        embed: false
      # Embed the AutoFill credential provider extension into the app bundle.
      - target: VELAAutoFill

  VELAAutoFill:
    type: app-extension
    platform: iOS
    sources:
      - path: AutoFill
      - path: Shared
    info:
      path: Generated/AutoFillInfo.plist
      properties:
        CFBundleDisplayName: VELA AutoFill
        NSExtension:
          NSExtensionPointIdentifier: com.apple.authentication-services-credential-provider-ui
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).CredentialProviderViewController
    entitlements:
      path: Generated/VELAAutoFill.entitlements
      properties:
        com.apple.developer.authentication-services.autofill-credential-provider: true
        com.apple.security.application-groups:
          - group.com.vela.vault
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.vela.vault.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vela.vault.autofill
        TARGETED_DEVICE_FAMILY: "1"
        OTHER_LDFLAGS: -framework Security
        # Extension targets are APPLICATION_EXTENSION_API_ONLY, which makes
        # UIApplication.shared (used by WebAuthnCeremony's presentation
        # anchor lookup — never actually exercised from this extension) a
        # compile error. This flag lets that one call site route around it.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: VELA_APP_EXTENSION
    dependencies:
      - framework: ../libVELA/vela-apple-bridge/VelaCore.xcframework
        embed: false

  VELATests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vela.vault.tests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: VELA

  VELAUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vela.vault.uitests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: VELA

schemes:
  VELA:
    build:
      targets:
        VELA: all
        VELAAutoFill: all
        VELATests: [test]
        VELAUITests: [test]
    test:
      config: Debug
      targets:
        - VELATests
        - VELAUITests
    run:
      config: Debug
