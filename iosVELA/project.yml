name: VELA
options:
  bundleIdPrefix: com.vela
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  VELA:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: VELA
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vela.vault
        TARGETED_DEVICE_FAMILY: "1"
        # The Rust core may reference Security (RNG); link it defensively.
        OTHER_LDFLAGS: -framework Security
    dependencies:
      # Static-library XCFramework produced by libVELA/vela-apple-bridge — link, don't embed.
      - framework: ../libVELA/vela-apple-bridge/VelaCore.xcframework
        embed: false

  VELATests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vela.vault.tests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: VELA

  VELAUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vela.vault.uitests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: VELA

schemes:
  VELA:
    build:
      targets:
        VELA: all
        VELATests: [test]
        VELAUITests: [test]
    test:
      config: Debug
      targets:
        - VELATests
        - VELAUITests
    run:
      config: Debug
